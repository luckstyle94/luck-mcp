services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: luck-mcp-postgres
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: luck-mcp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luck-mcp-server
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgres://mcp:mcp@postgres:5432/mcp?sslmode=disable
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      LOG_LEVEL: info
    stdin_open: true
    tty: true

volumes:
  pgdata:
  ollama:
